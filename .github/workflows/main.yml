name: Daily Update
on:
  schedule:
    - cron: '0 11 * * *' # run at 11am UTC
  push:
    branches:
      - main

# Prevent overlapping runs. With 10000 sims each run takes ~5 hours, so
# back-to-back pushes would otherwise spawn concurrent runs that race on
# `git push` to main — only one wins and the rest fail non-fast-forward.
concurrency:
  group: daily-update
  cancel-in-progress: true

jobs:
  daily_update:
    runs-on: ubuntu-latest
    steps:
        - name: Check if we should skip (before Oct 20, 2025)
          run: |
            current_date=$(date +%Y%m%d)
            target_date=20251020
            if [ $current_date -lt $target_date ]; then
              echo "Current date ($current_date) is before October 20, 2025 ($target_date). Skipping workflow."
              exit 0
            fi
            echo "Proceeding with workflow"
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

        - name: Create data directories
          run: mkdir -p data/sim_results/archive data/seed_reports/archive

        # Main workflow
        - name: Run main
          run: python main.py --update --num-sims 10000 --year 2026

        - name: Commit and push if there are changes
          run: |
            git config --global user.email "bot@invalid.email"
            git config --global user.name "GitHub Action Bot"
            git add .
            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            # Rebase our changes on top of latest main in case upstream
            # moved forward while the (multi-hour) simulation was running.
            # `reset --soft` keeps all staged changes; we recommit on top
            # of the new tip and push. Retries handle transient push races.
            git fetch origin main
            git reset --soft origin/main
            git add .
            git commit -m "Automated data update [skip ci]"
            for attempt in 1 2 3 4; do
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push attempt $attempt failed; refreshing base and retrying..."
              git fetch origin main
              git reset --soft origin/main
              git add .
              git commit --amend --no-edit
              sleep $((attempt * 5))
            done
            echo "git push failed after 4 attempts"
            exit 1
